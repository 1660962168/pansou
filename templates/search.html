endblock %} {% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/index-Cp-LnOST.css') }}" />
<link rel="stylesheet" href="{{ url_for('static', filename='css/Search.css') }}" />

<style>
  .loading-box {
    text-align: center;
    padding: 40px;
    color: #888;
    font-size: 14px;
  }

  .global-loading-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(255, 255, 255, 0.6);
    z-index: 9999;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(2px);
  }

  .global-spinner {
    width: 40px;
    height: 40px;
    border: 4px solid #e2e8f0;
    border-top: 4px solid #3b82f6;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 12px;
  }

  @keyframes spin {
    0% {
      transform: rotate(0deg);
    }

    100% {
      transform: rotate(360deg);
    }
  }

  @media (max-width: 768px) {
    .pc-link-toggle .toggle-link-btn {
      display: none !important;
    }

    .pc-link-toggle .pc-link-content {
      display: block !important;
    }
  }

  .disabled-item {
    opacity: 0.5;
    cursor: not-allowed;
    pointer-events: none;
    filter: grayscale(100%);
    transition: all 0.3s;
  }
  .empty-state-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    text-align: center;
    background: #fff;
    border-radius: 8px;
    margin-top: 10px;
  }
  .empty-icon {
    width: 160px;
    height: 160px;
    margin-bottom: 16px;
  }
  .empty-title {
    font-size: 17px;
    font-weight: 600;
    color: #1f2937;
    margin-bottom: 8px;
  }
  .empty-subtitle {
    font-size: 14px;
    color: #6b7280;
    margin-bottom: 24px;
    line-height: 1.5;
  }
  .empty-btn {
    background-color: #3b82f6;
    color: #fff;
    border: none;
    padding: 10px 32px;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: background-color 0.2s;
  }
  .empty-btn:hover {
    background-color: #2563eb;
  }

  .count-badge {
    display: inline-block;
    background-color: #ff4d4f;
    color: #fff;
    border-radius: 10px;
    min-width: 18px;
    height: 18px;
    line-height: 18px;
    text-align: center;
    font-size: 12px;
    margin-left: 4px;
    padding: 0 5px;
    font-weight: bold;
    vertical-align: middle;
    transform: translateY(-1px);
  }
</style>
{% endblock %} {% block content %}
<div id="search-app-wrapper" v-pre>
  <div id="search-app"></div>
</div>

<script type="text/x-template" id="search-template">

            </div>

<script src="{{ url_for('static', filename='js/qrcode.min.js') }}"></script>
<script>
  window.addEventListener("load", function () {
    setTimeout(function () {
      new Vue({
        el: "#search-app",
        template: "#search-template",
        delimiters: ["[[", "]]"],
        data() {
          return {
            keyword: "",
            currentTab: "baidu",
            tabs: [
              { name: "百度网盘", value: "baidu" },
              { name: "夸克APP", value: "quark" },
            ],
            // --- 视图绑定队列 ---
            results: [],
            localResults: [],
            displayTabCounts: { baidu: 0, quark: 0 },
            
            // --- 内存缓冲池与渲染调度系统 ---
            memoryLocalResults: [],
            memoryCloudResults: { baidu: [], quark: [] },
            localRenderIndex: 0,
            cloudRenderIndex: { baidu: 0, quark: 0 },
            isLocalFetchComplete: false,
            isLocalRenderComplete: false,
            renderFrame: null,
            
            // --- 状态控制 ---
            isLoadingTg: { baidu: false, quark: false },
            isLoadingPlugin: { baidu: false, quark: false },
            hasSearched: false,
            currentBatchId: 0,
            globalLoading: false,
            disabledItems: [],
            
            // --- 弹窗与交互状态 ---
            dialog_overlay: false,
            dialogTitle: "",
            dialogTips: "",
            showPwdHint: false,
            showYellowTip: false,
            dialogLink: "",
            dialogPwd: "",
            dialogResourceTitle: "",
            showPcLink: false,
            showBanner: false,
            systemQrCode: "{{ system_config.group_qrcode }}",
            errorDialog: false,
            errorMessage: "",
            lastKeyword: "",
            countdownText: "10:00",
            countdownSeconds: 600,
            countdownTimer: null,
          };
        },
        computed: {
          fullDialogLink() {
            if (!this.dialogLink) return "";
            return this.dialogPwd ? `${this.dialogLink}?pwd=${this.dialogPwd}` : this.dialogLink;
          },
        },
        mounted() {
          const params = new URLSearchParams(window.location.search);
          const kw = params.get("kw");
          if (kw) {
            this.keyword = kw;
            this.doSearch();
          }
        },
        watch: {
          dialog_overlay(newVal) {
            if (newVal) this.startCountdown();
            else this.clearCountdown();
          },
        },
        methods: {
          startCountdown() {
            this.clearCountdown();
            this.countdownSeconds = 600;
            this.countdownText = "10:00";
            this.countdownTimer = setInterval(() => {
              this.countdownSeconds--;
              if (this.countdownSeconds <= 0) {
                this.clearCountdown();
                this.dialog_overlay = false;
                return;
              }
              const m = Math.floor(this.countdownSeconds / 60);
              const s = this.countdownSeconds % 60;
              this.countdownText = `${m}:${s.toString().padStart(2, "0")}`;
            }, 1000);
          },
          clearCountdown() {
            if (this.countdownTimer) {
              clearInterval(this.countdownTimer);
              this.countdownTimer = null;
            }
          },
          // 渲染引擎宏任务调度
          startRenderLoop(batchId) {
            const loop = () => {
              // 物理级串流拦截，拒绝旧批次污染
              if (this.currentBatchId !== batchId) return;

              // [阶段 1]：Local 内存池出列 (最高优先级)
              if (this.localRenderIndex < this.memoryLocalResults.length) {
                // 每帧处理 2 条，平衡性能与视觉递增感
                for(let i = 0; i < 2 && this.localRenderIndex < this.memoryLocalResults.length; i++) {
                  const item = this.memoryLocalResults[this.localRenderIndex];
                  this.localResults.push(item);
                  
                  // 同步递增 Badge
                  if (item.baidu_current_link) this.displayTabCounts.baidu++;
                  if (item.quark_current_link) this.displayTabCounts.quark++;
                  
                  this.localRenderIndex++;
                }
              } else if (this.isLocalFetchComplete && !this.isLocalRenderComplete) {
                // Local 全部消费且请求终止，释放阻塞锁
                this.isLocalRenderComplete = true;
              }

              // [阶段 2]：Cloud 内存池出列 (依赖局部阻塞锁解除)
              if (this.isLocalRenderComplete) {
                const active = this.currentTab;
                
                // 处理当前激活态 Tab，执行 DOM 挂载
                for(let i = 0; i < 2 && this.cloudRenderIndex[active] < this.memoryCloudResults[active].length; i++) {
                  const item = this.memoryCloudResults[active][this.cloudRenderIndex[active]];
                  this.results.push(item);
                  this.displayTabCounts[active]++;
                  this.cloudRenderIndex[active]++;
                }

                // 后台静默处理非激活 Tab，仅剥离索引与计数计算，严禁触碰 DOM
                this.tabs.forEach(tab => {
                  const t = tab.value;
                  if (t !== active) {
                    for(let i = 0; i < 2 && this.cloudRenderIndex[t] < this.memoryCloudResults[t].length; i++) {
                      this.displayTabCounts[t]++;
                      this.cloudRenderIndex[t]++;
                    }
                  }
                });
              }

              // 评估是否维持事件环
              const isFetching = this.isLoadingTg.baidu || this.isLoadingTg.quark || 
                                 this.isLoadingPlugin.baidu || this.isLoadingPlugin.quark ||
                                 !this.isLocalFetchComplete;
              
              const hasMoreLocal = this.localRenderIndex < this.memoryLocalResults.length;
              const hasMoreCloud = this.cloudRenderIndex.baidu < this.memoryCloudResults.baidu.length || 
                                   this.cloudRenderIndex.quark < this.memoryCloudResults.quark.length;

              if (isFetching || hasMoreLocal || hasMoreCloud) {
                this.renderFrame = requestAnimationFrame(loop);
              }
            };
            
            this.renderFrame = requestAnimationFrame(loop);
          },
          async fetchLocalSource(batchId) {
            try {
              const response = await fetch("/api/search_local", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ kw: this.keyword.trim() }),
              });
              if (this.currentBatchId !== batchId) return;
              const res = await response.json();
              if (res.code === 200) {
                // 仅写入 Buffer，视图更新下放至帧调度器
                this.memoryLocalResults = res.data || [];
              }
            } catch (e) {
              console.error("本地精选请求崩溃:", e);
            } finally {
              if (this.currentBatchId === batchId) {
                this.isLocalFetchComplete = true;
              }
            }
          },
          openLocalLink(item) {
            let targetType = this.currentTab;
            let finalLink = "";
            let finalPwd = "";

            if (targetType === "baidu") {
              if (item.baidu_current_link) { finalLink = item.baidu_current_link; finalPwd = item.baidu_pwd; } 
              else if (item.quark_current_link) { targetType = "quark"; finalLink = item.quark_current_link; finalPwd = item.quark_pwd; }
            } else {
              if (item.quark_current_link) { finalLink = item.quark_current_link; finalPwd = item.quark_pwd; } 
              else if (item.baidu_current_link) { targetType = "baidu"; finalLink = item.baidu_current_link; finalPwd = item.baidu_pwd; }
            }

            if (!finalLink) { alert("当前条目暂无有效分享链接"); return; }

            this.dialogTitle = targetType === "quark" ? "夸克APP" : "百度网盘";
            this.dialogResourceTitle = item.name;
            this.dialogLink = finalLink;
            this.dialogPwd = finalPwd || "";
            this.dialogTips = targetType === "quark" ? "请保存至网盘后下载" : "打开网盘 - 搜索框 - 相机图标 - 扫码";
            this.showYellowTip = targetType === "quark";
            this.showPwdHint = !!finalPwd;
            this.showPcLink = false;
            this.dialog_overlay = true;

            this.$nextTick(() => {
              const qrContainer = document.getElementById("dialog-qrcode");
              if (qrContainer) {
                qrContainer.innerHTML = "";
                new QRCode(qrContainer, {
                  text: this.fullDialogLink,
                  width: 120, height: 120,
                  colorDark: "#000000", colorLight: "#ffffff",
                  correctLevel: QRCode.CorrectLevel.L,
                });
              }
            });
          },
          openNetdiskLink() {
            if (!this.fullDialogLink) return;
            const ua = navigator.userAgent.toLowerCase();
            if (ua.match(/MicroMessenger/i) == "micromessenger") {
              alert("请点击右上角选择在【默认浏览器】中打开，以拉起网盘APP。");
              window.location.href = this.fullDialogLink;
            } else {
              window.open(this.fullDialogLink, "_blank");
            }
          },
          openBanner() {
            this.dialog_overlay = false;
            this.showBanner = true;
            this.$nextTick(() => {
              const qrContainer = document.getElementById("group-qrcode-local");
              if (qrContainer && this.systemQrCode && qrContainer.innerHTML === "") {
                new QRCode(qrContainer, {
                  text: this.systemQrCode,
                  width: 140, height: 140,
                  colorDark: "#000000", colorLight: "#ffffff",
                  correctLevel: QRCode.CorrectLevel.L,
                });
              }
            });
          },
          copyToClipboard(text) {
            navigator.clipboard.writeText(text)
              .then(() => alert("链接已成功复制到剪贴板！"))
              .catch((err) => { console.error("复制失败", err); alert("复制失败，请手动选择复制。"); });
          },
          getTabName(val) {
            const tab = this.tabs.find((t) => t.value === val);
            return tab ? tab.name : "未知类型";
          },
          formatDate(dateStr) {
            if (!dateStr) return "未知";
            const d = new Date(dateStr);
            return isNaN(d.getTime()) ? dateStr : d.toLocaleDateString() + " " + d.toLocaleTimeString();
          },
          switchTab(val) {
            if (this.currentTab === val) return;
            this.currentTab = val;
            
            // 零延迟热切换：直接利用静默步进的云端游标，做一次性内存克隆，恢复全视口数据
            if (this.keyword.trim() && this.lastKeyword === this.keyword.trim() && this.hasSearched) {
              this.results = this.memoryCloudResults[val].slice(0, this.cloudRenderIndex[val]);
            } else if (this.keyword.trim()) {
              this.doSearch();
            }
          },
          async doSearch() {
            if (!this.keyword.trim() || this.isLoadingTg[this.currentTab] || this.isLoadingPlugin[this.currentTab]) return;

            // 状态机重置，确保无遗留幽灵数据
            this.displayTabCounts = { baidu: 0, quark: 0 };
            this.results = [];
            this.localResults = [];
            this.memoryLocalResults = [];
            this.memoryCloudResults = { baidu: [], quark: [] };
            this.localRenderIndex = 0;
            this.cloudRenderIndex = { baidu: 0, quark: 0 };
            this.isLocalFetchComplete = false;
            this.isLocalRenderComplete = false;
            
            if (this.renderFrame) {
              cancelAnimationFrame(this.renderFrame);
              this.renderFrame = null;
            }

            this.lastKeyword = this.keyword.trim();
            this.currentBatchId++;
            const batchId = this.currentBatchId;

            this.isLoadingTg = { baidu: true, quark: true };
            this.isLoadingPlugin = { baidu: true, quark: true };
            this.hasSearched = true;

            const newUrl = new URL(window.location.href);
            newUrl.searchParams.set('kw', this.keyword.trim());
            window.history.pushState({}, '', newUrl);

            // 唤醒全局渲染队列
            this.startRenderLoop(batchId);

            // 并发发射 I/O
            this.fetchSource('tg', batchId, 'baidu');
            this.fetchSource('plugin', batchId, 'baidu');
            this.fetchSource('tg', batchId, 'quark');
            this.fetchSource('plugin', batchId, 'quark');
            this.fetchLocalSource(batchId);
          },
          async fetchSource(srcType, batchId, targetTab) {
            try {
              const response = await fetch('/api/do_search', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ kw: this.keyword.trim(), cloud_types: [targetTab], src: srcType })
              });

              if (this.currentBatchId !== batchId) return;
              if (!response.ok) throw new Error(`HTTP ${response.status}`);

              const res = await response.json();
              if (this.currentBatchId !== batchId) return;

              let merged = res.code === 200 && res.data ? (res.data.merged_by_type || (res.data.data && res.data.data.merged_by_type)) : null;

              if (merged) {
                // [拦截清洗]：强校验 url 字段，剔除空值或无效链接，避免内存池污染与无效 DOM 渲染
                const newItems = (merged[targetTab] || []).filter(item => item.url && item.url.trim() !== "");
                if (newItems.length > 0) {
                  // 数据追加至内存池，脱离 DOM 开销
                  this.memoryCloudResults[targetTab] = this.memoryCloudResults[targetTab].concat(newItems);
                }
              } else if (res.code !== 200) {
                console.warn(`[${srcType} - ${targetTab}] 节点响应异常:`, res.message || res.data?.message);
              }
            } catch (error) {
              console.error(`[${srcType} - ${targetTab}] 请求崩溃:`, error);
            } finally {
              if (this.currentBatchId === batchId) {
                this.$nextTick(() => {
                  if (srcType === 'tg') this.isLoadingTg[targetTab] = false;
                  if (srcType === 'plugin') this.isLoadingPlugin[targetTab] = false;
                });
              }
            }
          },
          async decryptLink(item) {
            if (!item.url || this.disabledItems.includes(item.url)) return;
            this.globalLoading = true;
            try {
              const response = await fetch("/api/decrypt", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ url: item.url, password: item.password || "" }),
              });
              const res = await response.json();
              if (res.code === 200) {
                this.dialogTitle = res.data.type;
                this.dialogResourceTitle = item.note || item.title || "资源链接";
                this.dialogLink = res.data.link;
                this.dialogPwd = res.data.pwd;
                this.dialogTips = res.data.type === "夸克APP" ? "请保存至网盘后下载" : "打开网盘 - 搜索框 - 相机图标 - 扫码";
                this.showYellowTip = res.data.type === "夸克APP";
                this.showPwdHint = !!res.data.pwd;
                this.showPcLink = false; 
                this.dialog_overlay = true;

                this.$nextTick(() => {
                  const qrContainer = document.getElementById("dialog-qrcode");
                  if (qrContainer) {
                    qrContainer.innerHTML = "";
                    new QRCode(qrContainer, {
                      text: this.fullDialogLink,
                      width: 120, height: 120,
                      colorDark: "#000000", colorLight: "#ffffff",
                      correctLevel: QRCode.CorrectLevel.L,
                    });
                  }
                });
              } else {
                let errorText = res.message || "";
                let tipMsg = "提取异常，请稍后再试";

                if (errorText.match(/失效|404|取消了分享|不存在|错误/)) {
                  tipMsg = "该资源已失效，请更换链接获取";
                } else if (errorText.match(/空间不足|容量|满|10008/)) {
                  tipMsg = "剩余空间不足，无法转存，联系群主释放空间！";
                } else if (errorText.match(/网络错误|超时/)) {
                  tipMsg = "网络连接异常，请稍后再试";
                } else if (errorText.match(/取消|分享/)) {
                  tipMsg = "该资源已失效，请更换链接获取";
                }
                else {
                  tipMsg = "获取失败: " + errorText;
                }
                this.errorMessage = tipMsg;
                this.errorDialog = true;
                this.disabledItems.push(item.url);
              }
            } catch (e) {
              console.error("解密请求异常:", e);
              this.errorMessage = "网络请求异常，请稍后再试";
              this.errorDialog = true;
            } finally {
              this.globalLoading = false;
            }
          },
        },
      });
    }, 50);
  });
</script>
