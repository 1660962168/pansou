<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统维护 - 稍等片刻</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.95);
        }
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--primary-gradient);
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            overflow: hidden;
        }
        .card {
            background: var(--glass-bg);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 450px;
            width: 90%;
            position: relative;
        }
        .icon-box {
            width: 80px;
            height: 80px;
            background: #f1f5f9;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            color: #764ba2;
            font-size: 40px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        h1 {
            color: #1e293b;
            margin: 0 0 0.5rem;
            font-size: 1.75rem;
        }
        p {
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .info {
            background: #f8fafc;
            padding: 1rem;
            border-radius: 12px;
            font-size: 14px;
            color: #475569;
            border: 1px dashed #cbd5e1;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon-box">
            <i class="ri-settings-4-line"></i>
        </div>
        <h1>正在系统维护</h1>
        <p>为了给您提供更优质的资源检索体验，我们正在对服务器进行例行升级。预计很快就会恢复正常，感谢您的耐心等待。</p>
        <div class="info">
            <i class="ri-information-line"></i> 管理员正在全力处理中...
        </div>
    </div>
</body>
</html>
